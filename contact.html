<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Marissa Mallinger</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

  <style>
    :root {
      --navy:        #0b1520;
      --dark-green:  #162b22;
      --mid-green:   #2f614b;
      --accent-teal: #4da67a;
      --accent-glow: rgba(77, 166, 122, 0.2);
      --text-light:  #e8f0ec;
      --text-muted:  #8aab9a;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--dark-green);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    .hero-banner {
      background: var(--navy);
      padding: 5rem 2rem 3rem;
      text-align: center;
      position: relative;
    }

    .hero-banner::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(77,166,122,0.3), transparent);
    }

    .hero-eyebrow {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-teal);
      margin: 0 0 0.75rem;
    }

    .hero-banner h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: white;
      margin: 0 0 0.75rem;
      font-weight: 700;
    }

    .hero-banner p {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--text-muted);
      margin: 0;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Contact section ── */
    .contact-section {
      flex: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
      width: 100%;
    }

    .contact-content {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-content { grid-template-columns: 1fr; gap: 2.5rem; }
    }

    /* ── Form ── */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .contact-form input,
    .contact-form textarea {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(77,166,122,0.25);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--text-light);
      transition: border-color 0.25s ease, background 0.25s ease;
      outline: none;
      width: 100%;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: rgba(77,166,122,0.6);
      background: rgba(77,166,122,0.05);
    }

    .contact-form textarea {
      min-height: 150px;
      resize: vertical;
    }

    .contact-form button {
      background: transparent;
      color: var(--accent-teal);
      padding: 0.75rem 2rem;
      border: 1px solid rgba(77,166,122,0.4);
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      align-self: flex-start;
    }

    .contact-form button:hover {
      background: rgba(77,166,122,0.1);
      border-color: var(--accent-teal);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    /* ── Contact info ── */
    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      padding-top: 0.5rem;
    }

    .info-block h2 {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-teal);
      margin: 0 0 0.6rem;
    }

    .info-block p,
    .info-block a {
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--text-muted);
      text-decoration: none;
      line-height: 1.6;
      transition: color 0.2s ease;
    }

    .info-block a:hover { color: var(--accent-teal); }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 400;
      transition: color 0.2s ease;
    }

    .social-link:hover { color: var(--accent-teal); }

    .social-link::before {
      content: '→';
      color: var(--accent-teal);
      opacity: 0.5;
      font-size: 0.8rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      background: var(--navy);
      color: rgba(255,255,255,0.25);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>
  <script>
    fetch('./navbar.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('navbar-placeholder').innerHTML = html;
        const script = document.createElement('script');
        script.src = './utils/navbar.js';
        document.body.appendChild(script);
      });
  </script>

  <!-- ── Hero ── -->
  <div class="hero-banner">
    <p class="hero-eyebrow">Get in Touch</p>
    <h1>Let's Connect</h1>
    <p>Have a question or want to work together? I'd love to hear from you.</p>
  </div>

  <!-- ── Contact ── -->
  <section class="contact-section">
    <div class="contact-content">

      <!-- Form -->
      <form class="contact-form" id="contactForm" data-aos="fade-right" data-aos-duration="700">
        <input type="text" id="name" name="name" placeholder="Your Name" required />
        <input type="email" id="email" name="email" placeholder="Your Email" required />
        <textarea id="message" name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>

      <!-- Info -->
      <div class="contact-info" data-aos="fade-left" data-aos-duration="700" data-aos-delay="100">

        <div class="info-block">
          <h2>Email</h2>
          <a href="mailto:marissamallinger@gmail.com">marissamallinger@gmail.com</a>
        </div>

        <div class="info-block">
          <h2>Location</h2>
          <p>Round Rock, TX</p>
        </div>

        <div class="info-block">
          <h2>Elsewhere</h2>
          <div class="social-links">
            <a href="https://github.com/Luna3934" target="_blank" class="social-link">GitHub</a>
            <a href="https://www.linkedin.com/in/marissa-mallinger" target="_blank" class="social-link">LinkedIn</a>
          </div>
        </div>

      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 Marissa Mallinger. All Rights Reserved.</p>
  </footer>

  <script src="./utils/formSubmission.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ offset: 100, duration: 700, once: true, easing: 'ease-out-cubic' });
  </script>

</body>
</html>
