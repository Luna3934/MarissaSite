<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume – Marissa Mallinger</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

  <style>
    :root {
      --navy:        #0b1520;
      --dark-green:  #162b22;
      --mid-green:   #2f614b;
      --accent-teal: #4da67a;
      --accent-glow: rgba(77, 166, 122, 0.2);
      --text-light:  #e8f0ec;
      --text-muted:  #8aab9a;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--dark-green);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav placeholder ── */
    #navbar-placeholder { position: relative; z-index: 100; }

    /* ── Hero header ── */
    .resume-hero {
      text-align: center;
      padding: 5rem 2rem 3rem;
      position: relative;
    }

    .resume-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(77,166,122,0.25), transparent);
    }

    .resume-eyebrow {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-teal);
      margin-bottom: 0.75rem;
    }

    .resume-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: white;
      margin: 0 0 1rem;
      font-weight: 700;
    }

    .resume-hero p {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--text-muted);
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Download buttons ── */
    .resume-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 2.5rem 2rem 3rem;
      flex-wrap: wrap;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--accent-teal);
      padding: 0.65rem 1.75rem;
      border: 1px solid rgba(77,166,122,0.4);
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .btn-download:hover {
      background: rgba(77,166,122,0.1);
      border-color: var(--accent-teal);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    .btn-download svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── PDF viewer ── */
    .pdf-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 0 2rem 5rem;
    }

    .pdf-card {
      width: 100%;
      max-width: 820px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(77,166,122,0.18);
      box-shadow: 0 30px 70px rgba(0,0,0,0.5), 0 0 40px rgba(77,166,122,0.06);
    }

    .pdf-frame {
      width: 100%;
      height: 88vh;
      border: none;
      display: block;
      background: white;
    }

    /* Mobile image fallback */
    .pdf-image-mobile {
      display: none;
      width: 100%;
      height: auto;
    }

    @media (max-width: 768px) {
      .pdf-frame { display: none; }
      .pdf-image-mobile { display: block; }
      .pdf-card { border-radius: 10px; }
      .resume-hero { padding: 4rem 2rem 2.5rem; }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      background: var(--navy);
      color: rgba(255,255,255,0.25);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      margin-top: auto;
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>
  <script>
    fetch('./navbar.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('navbar-placeholder').innerHTML = html;
        const s = document.createElement('script');
        s.src = './utils/navbar.js';
        document.body.appendChild(s);
      });
  </script>

  <!-- ── Header ── -->
  <div class="resume-hero" data-aos="fade-up">
    <p class="resume-eyebrow">Marissa Mallinger</p>
    <h1>Resume</h1>
    <p>Download a copy or browse it below.</p>
  </div>

  <!-- ── Download buttons ── -->
  <div class="resume-actions" data-aos="fade-up" data-aos-delay="100">
    <a href="./pdfs/Long Resume.pdf" download class="btn-download">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Comprehensive Resume
    </a>
    <a href="./pdfs/Short Resume.pdf" download class="btn-download">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      One-Page Resume
    </a>
  </div>

  <!-- ── PDF viewer ── -->
  <div class="pdf-wrapper" data-aos="fade-up" data-aos-delay="150">
    <div class="pdf-card">
      <iframe class="pdf-frame" src="./pdfs/Long Resume.pdf"></iframe>
      <img class="pdf-image-mobile" src="./img/Long Resume1.jpg" alt="Resume page 1" />
      <img class="pdf-image-mobile" src="./img/Long Resume2.jpg" alt="Resume page 2" />
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Marissa Mallinger. All Rights Reserved.</p>
  </footer>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ offset: 120, duration: 700, once: true, easing: 'ease-out-cubic' });
  </script>

</body>
</html>
